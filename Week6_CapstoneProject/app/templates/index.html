<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>ToDo — Capstone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>My ToDo</h1>
    <div class="input-row">
      <input id="taskInput" placeholder="Add a new task..." />
      <button id="addBtn">Add</button>
    </div>
    <ul id="todoList"></ul>
    <div class="footer">
      <small>Metrics: <a href="/metrics" target="_blank">/metrics</a> · Health: <a href="/healthz">/healthz</a></small>
    </div>
  </div>

<script>
async function loadTodos(){
  const res = await fetch('/api/todos');
  const todos = await res.json();
  const ul = document.getElementById('todoList');
  ul.innerHTML = '';
  for (const t of todos){
    const li = document.createElement('li');
    li.className = 'todo-item' + (t.done ? ' done' : '');
    li.innerHTML = `
      <span class="title">${escapeHtml(t.title)}</span>
      <div class="actions">
        <button onclick="toggleTodo(${t.id})">${t.done ? 'Undo' : 'Done'}</button>
        <button onclick="deleteTodo(${t.id})" class="del">Delete</button>
      </div>
    `;
    ul.appendChild(li);
  }
}

function escapeHtml(unsafe) {
  return unsafe
       .replace(/&/g, "&amp;")
       .replace(/</g, "&lt;")
       .replace(/>/g, "&gt;")
       .replace(/"/g, "&quot;")
       .replace(/'/g, "&#039;");
}

async function addTodo(){
  const input = document.getElementById('taskInput');
  const title = input.value.trim();
  if (!title) return;
  await fetch('/api/todos', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({title})
  });
  input.value = '';
  loadTodos();
}

async function toggleTodo(id){
  await fetch(`/api/todos/${id}/toggle`, {method: 'PUT'});
  loadTodos();
}

async function deleteTodo(id){
  if (!confirm('Delete this task?')) return;
  await fetch(`/api/todos/${id}`, {method: 'DELETE'});
  loadTodos();
}

document.getElementById('addBtn').addEventListener('click', addTodo);
document.getElementById('taskInput').addEventListener('keydown', (e)=>{ if(e.key === 'Enter') addTodo(); });

window.onload = loadTodos;
</script>
</body>
</html>
